# Static analysis over Terraform, workflow definitions, and any Dockerfiles.
#
# Semgrep ships as a Python package, not a static release binary, so the
# checksum-pinned-binary pattern used for gitleaks and trivy doesn't apply.
# It runs from the official container image pinned by sha256 digest instead —
# the same immutable-artifact guarantee from a different artifact type.
#
# Registry rule packs (p/...) resolve at run time: the scanner is pinned for
# supply-chain integrity, while detection rules track upstream — the same way
# gitleaks and trivy rules arrive bundled with their version bumps.
name: sast

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  semgrep:
    name: semgrep
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:1.165.0@sha256:f4791a54c891eabe1188248135574e6e03dfc31dfd3f3b747c7bec7079bfed1b
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Semgrep scan
        run: >-
          semgrep scan
          --config p/terraform
          --config p/secrets
          --config p/dockerfile
          --config p/ci
          --metrics=off
          --error
